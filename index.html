<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morales Lawn & Care Services LLC</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f5f5f5;
}

header {
  background:#1b5e20;
  color:white;
  text-align:center;
  padding:100px 20px;
}

.logo {
  width:280px;
  max-width:90%;
  border-radius:20px;
  margin-bottom:20px;
}

.cta {
  display:inline-block;
  margin-top:20px;
  padding:14px 25px;
  background:#4CAF50;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:600;
}

.form-box {
  max-width:500px;
  margin:-60px auto 40px;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.form-box input, .form-box select {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:6px;
  border:1px solid #ddd;
}

.form-box button {
  width:100%;
  padding:14px;
  background:#22c55e;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:8px;
}

.section {
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

.slider {
  position:relative;
  width:100%;
  overflow:hidden;
  border-radius:12px;
  margin-bottom:25px;
}

.slider img {
  width:100%;
  display:block;
}

.after {
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}

.handle {
  position:absolute;
  top:0;
  left:50%;
  width:4px;
  height:100%;
  background:white;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <p>Serving Asheville • Hendersonville • Arden</p>
  <a href="tel:+18282737083" class="cta">📞 Call Now</a>
</header>

<div class="form-box">
  <h2>Get a Free Quote</h2>

  <!-- ⚠️ REPLACE YOUR FORM LINK BELOW -->
  <form action="https://formspree.io/f/mkoqaeql" method="POST">

    <input type="text" name="name" placeholder="Your Name" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>

    <select name="service" id="serviceSelect" required>
      <option value="">Select Service</option>
      <option>Lawn Mowing</option>
      <option>Mulch</option>
      <option>Cleanup</option>
      <option>Pressure Washing</option>
      <option>Other</option>
    </select>

    <!-- Hidden field for "Other" -->
    <input type="text" name="other_service" id="otherService"
    placeholder="What service do you need?"
    style="display:none;">

    <button type="submit">Get Quote</button>
  </form>
</div>

<div class="section">
  <h2>Drag to See the Transformation</h2>

  <!-- SLIDER 1 -->
  <div class="slider">
    <img src="https://cdn.jsdelivr.net/gh/infomoraleslawncarellc-blip/moraleslawncareservicesllc@main/before-after/IMG_0138.jpeg">
    <div class="after">
      <img src="https://cdn.jsdelivr.net/gh/infomoraleslawncarellc-blip/moraleslawncareservicesllc@main/before-after/IMG_0144.jpeg">
    </div>
    <div class="handle"></div>
  </div>

  <!-- SLIDER 2 -->
  <div class="slider">
    <img src="https://cdn.jsdelivr.net/gh/infomoraleslawncarellc-blip/moraleslawncareservicesllc@main/before-after/IMG_0140.jpeg">
    <div class="after">
      <img src="https://cdn.jsdelivr.net/gh/infomoraleslawncarellc-blip/moraleslawncareservicesllc@main/before-after/IMG_0146.jpeg">
    </div>
    <div class="handle"></div>
  </div>

  <!-- SLIDER 3 -->
  <div class="slider">
    <img src="https://cdn.jsdelivr.net/gh/infomoraleslawncarellc-blip/moraleslawncareservicesllc@main/before-after/IMG_0136.jpeg">
    <div class="after">
      <img src="https://cdn.jsdelivr.net/gh/infomoraleslawncarellc-blip/moraleslawncareservicesllc@main/before-after/IMG_0154.jpeg">
    </div>
    <div class="handle"></div>
  </div>

  <!-- SLIDER 4 -->
  <div class="slider">
    <img src="https://cdn.jsdelivr.net/gh/infomoraleslawncarellc-blip/moraleslawncareservicesllc@main/before-after/IMG_0161.jpeg">
    <div class="after">
      <img src="https://cdn.jsdelivr.net/gh/infomoraleslawncarellc-blip/moraleslawncareservicesllc@main/before-after/IMG_0173.jpeg">
    </div>
    <div class="handle"></div>
  </div>

</div>

<script>
// BEFORE/AFTER SLIDER
document.querySelectorAll(".slider").forEach(slider => {
  let isDown = false;

  const after = slider.querySelector(".after");
  const handle = slider.querySelector(".handle");

  slider.addEventListener("mousedown", () => isDown = true);
  slider.addEventListener("mouseup", () => isDown = false);
  slider.addEventListener("mouseleave", () => isDown = false);

  slider.addEventListener("mousemove", e => {
    if (!isDown) return;
    let x = e.offsetX;
    let width = slider.offsetWidth;
    let percent = (x / width) * 100;

    after.style.width = percent + "%";
    handle.style.left = percent + "%";
  });

  slider.addEventListener("touchmove", e => {
    let rect = slider.getBoundingClientRect();
    let x = e.touches[0].clientX - rect.left;
    let percent = (x / rect.width) * 100;

    after.style.width = percent + "%";
    handle.style.left = percent + "%";
  });
});

// SHOW "OTHER" INPUT
document.getElementById("serviceSelect").addEventListener("change", function() {
  const otherField = document.getElementById("otherService");
  if (this.value === "Other") {
    otherField.style.display = "block";
    otherField.required = true;
  } else {
    otherField.style.display = "none";
    otherField.required = false;
  }
});
</script>

</body>
</html>
