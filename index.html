.lead-form {

.lead-form input,

.lead-form button {

/* 🔥 FIXED SLIDER */
.slider {
  position: relative;
  max-width: 600px;
  height: 350px;
  margin: 30px auto;
  overflow: hidden;
  border-radius: 12px;
}

.slider img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  top: 0;
  left: 0;
}

.after-img {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  height: 100%;
  overflow: hidden;
}

.handle {
  position: absolute;
  top: 0;
  left: 50%;
  width: 4px;
  height: 100%;
  background: white;
  z-index: 2;
  cursor: ew-resize;

footer {
